<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title id="pageTitle">Social Empires</title>
        <link rel="shortcut icon" href="img/icon.gif"/>
        <link rel="icon" type="image/png" href="img/icon.gif"/>
        <script src="https://unpkg.com/ruffle@latest/dist/ruffle.js"></script>
    </head>
    <body style="font-family: 'lucida grande',tahoma,verdana,arial,sans-serif; background-color: #f0f0f0;">
    <center>
        <div id="header" style="width: 760px; margin-top: 50px;">
            <div id="session" style="float: right;">
                <p style="display:inline">Logged in as <b>{{save_info.name}}</b> lvl {{save_info.level}} (<a href="/">logout</a>)</p>
            </div>
        </div>
        <br>
        <div id="gameBar" style="margin-top: 15px;">
            <div id="gamebar_top" style="width: 760px; height: 90px;">
                <div style="float: left; margin-left:155px; padding: 4px; font-size: 10pt">
                    <br><br><br>
                    <p style="display: inline">{{ version }}</p>
                </div>
            </div>
            <div id="gamebar_buttons" style="width: 760px;">
                &nbsp;
                <a class="gameBarButton" href="#"><div><img src="img/gift.png">Free Gifts</div></a>
                <a class="gameBarButton gameBarButtonSelected" href="#"><div><img>Play</div></a>
                <a class="gameBarButton" href="#"><div><img src="img/cash.png">Get Cash</div></a>
                <a class="gameBarButton" href="https://discord.gg/zW5gSbQJBw" target="_blank"><div><img src="img/discord.png">Discord</div></a>
                <a class="gameBarButton" href="https://github.com/AcidCaos/socialemperors#readme" target="_blank"><div><img src="img/github.png">GitHub</div></a>
            </div>
            <style>
                #gameBar {
                    text-align: left;
                    width: 760px;
                    margin-bottom: 0px;
                    padding: 0px;
                    background-color:rgb(137, 187, 15);
                    background-image: url('img/Gamebar_byTrevo.png');
                    background-repeat: no-repeat;
                    background-size: contain;
                    border-bottom: solid #6e5335 3px;
                }
                .gameBarButton {
                    display: inline-block;
                    height: 19px;
                    color: black;
                    border: solid 1.5px;
                    border-color: #9e7747;
                    background-color:rgb(255, 245, 131);
                    border-top-left-radius: 5px;
                    border-top-right-radius: 5px;
                    cursor: pointer;
                    text-decoration: none;
                    font-size: 11pt;
                    padding: 2px 3px 1px 3px; 
                }
                .gameBarButtonSelected {
                    background-color:rgb(233, 221, 81);
                }
                .gameBarButton img {
                    height: 17px;
                    padding-right: 3px;
                    vertical-align: middle;
                }
                .gameBarButton:hover {
                    background-color:rgb(250, 237, 90);
                    text-decoration: none;
                }
                .gameBarButtonSelected:hover {
                    background-color:rgb(223, 212, 82);
                }
            </style>
        </div>
        
        <div id="game-container" style="width: 760px; height: 600px; margin: 20px auto; background-color: #669C2C;">
            <div id="ruffle-player"></div>
        </div>
        
        <script>
            window.RufflePlayer = window.RufflePlayer || {};
            
            document.addEventListener("DOMContentLoaded", function() {
                var ruffle = window.RufflePlayer.newest();
                var player = ruffle.createPlayer();
                var container = document.getElementById("ruffle-player");
                container.innerHTML = "";
                container.appendChild(player);
                
                var serverUrl = "https://socialemperors-iv4f.onrender.com";
                var swfUrl = serverUrl + "/default01.static.socialpointgames.com/static/socialempires/swf/seloader.swf";
                
                var flashvars = {
                    spdebug: 'notnull',
                    brk: 0,
                    staticUrl: serverUrl + "/default01.static.socialpointgames.com/static/socialempires/",
                    dynamicUrl: serverUrl + "/dynamic.flash1.dev.socialpoint.es/appsfb/socialempiresdev/srvempires/",
                    skiphash12341: 'notnull',
                    fb_sig_user: '{{save_info.userid}}',
                    user_key: '123456789',
                    language: 'en',
                    accessToken: 'AAABbZAm0wdMUBALsOrR0Ho68CLjaOT8SV3vftKg9mbo1zZColaW5FljRVaLxPGxXXnm1M98mTZCAttcQ4GHwvSyXfsyxYmvKMH8Hmn5iliSPnjvIsZA6',
                    sex: 'm',
                    lastLoggedIn: '1349266517',
                    dailyBonus: 0,
                    friendsInfo: {{friendsInfo | tojson}},
                    serverTime: '{{serverTime}}',
                    forceSyncError: 1,
                    forceAttackReload: 0,
                    forceQuestReload: 0
                };
                
                var queryString = Object.keys(flashvars).map(function(key) {
                    return encodeURIComponent(key) + '=' + encodeURIComponent(flashvars[key]);
                }).join('&');
                
                player.load({
                    url: swfUrl + '?' + queryString
                });
                
                console.log("Ruffle loaded, playing SWF from:", swfUrl);
            });
        </script>
        
        <style>
            #ruffle-player {
                width: 100%;
                height: 100%;
            }
        </style>
    </center>
    </body>
                    </html>
